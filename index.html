<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Next Level To-Do App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-blur bg1"></div>
  <div class="bg-blur bg2"></div>

  <div class="container">
    <h1 class="title">✨ Smart To-Do</h1>
    <p class="subtitle">Organize your tasks beautifully and boost productivity 🚀</p>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter your task...">
      <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>

    <div class="stats">
      <div class="card">
        <h2 id="totalTasks">0</h2>
        <p>Total Tasks</p>
      </div>

      <div class="card">
        <h2 id="completedTasks">0</h2>
        <p>Completed</p>
      </div>

      <div class="card">
        <h2 id="pendingTasks">0</h2>
        <p>Pending</p>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterTasks('all',this)">All</button>
      <button class="filter-btn" onclick="filterTasks('pending',this)">Pending</button>
      <button class="filter-btn" onclick="filterTasks('completed',this)">Completed</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="empty" id="emptyMsg">
      No tasks added yet ✨
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
